name: Deploy Website

# Publishes website/ to GitHub Pages → appmeta.maskedsyntax.com
# Repo Settings → Pages → Source: GitHub Actions

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix website

      - name: Typecheck
        run: npm run check --prefix website

      - name: Build
        run: npm run build --prefix website

      - name: Verify output
        run: |
          test -f website/build/index.html
          test -f website/build/CNAME
          grep -qx 'appmeta.maskedsyntax.com' website/build/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://appmeta.maskedsyntax.com
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
